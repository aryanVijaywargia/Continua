        metadata:
          type: object
        engine:
          $ref: '#/components/schemas/EngineTraceInfo'

    TraceDetail:
      allOf:
        - $ref: '#/components/schemas/Trace'
        - type: object
          properties:
            trace_id:
              type: string
            user_id:
              type: string
            tags:
              type: array
              items:
                type: string
            environment:
              type: string
            release:
              type: string
            input:
              description: Trace input payload (any valid JSON)
            output:
              description: Trace output payload (any valid JSON)
