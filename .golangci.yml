run:
  timeout: 5m
  skip-dirs:
    - packages/proto-go  # Generated code

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/continua-ai/continua

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
