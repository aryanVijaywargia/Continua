          format: uuid
        trace_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
        user_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64
        error_count:
          type: integer
        total_cost_usd:
          type: number
        total_tokens_in:
          type: integer
          format: int64
        total_tokens_out:
          type: integer
          format: int64
        engine:
          $ref: '#/components/schemas/EngineTraceInfo'

    CompareSummary:
      type: object
      required:
        [
          total_spans_baseline,
          total_spans_candidate,
          matched_spans,
          unmatched_baseline_spans,
          unmatched_candidate_spans,
          heuristic_matches,
          duration_delta_ms,
          tokens_in_delta,
          tokens_out_delta,
          cost_delta_usd,
          total_semantic_baseline,
          total_semantic_candidate,
        ]
      properties:
        total_spans_baseline:
          type: integer
        total_spans_candidate:
          type: integer
        matched_spans:
          type: integer
        unmatched_baseline_spans:
          type: integer
        unmatched_candidate_spans:
          type: integer
        heuristic_matches:
          type: integer
        duration_delta_ms:
          type: integer
          format: int64
        tokens_in_delta:
          type: integer
          format: int64
        tokens_out_delta:
          type: integer
          format: int64
        cost_delta_usd:
          type: number
        total_semantic_baseline:
          type: integer
        total_semantic_candidate:
          type: integer

    CompareDiffStatus:
      type: string
      enum: [unchanged, changed, baseline_only, candidate_only]

    CompareMatchSource:
      type: string
      enum: [stable_id, heuristic]

    CompareSemanticEventType:
      type: string
      enum: [decision, effect, wait]

    SpanDiffRow:
      type: object
      required:
        [
          diff_status,
          changed_fields,
          baseline_span,
          candidate_span,
          semantic_groups,
          depth,
        ]
      properties:
        diff_status:
          $ref: '#/components/schemas/CompareDiffStatus'
        match_source:
          $ref: '#/components/schemas/CompareMatchSource'
        match_reason:
          type: string
        changed_fields:
          type: array
          items:
            type: string
        baseline_span:
          allOf:
            - $ref: '#/components/schemas/CompareSpanSummary'
          x-nullable: true
        candidate_span:
          allOf:
            - $ref: '#/components/schemas/CompareSpanSummary'
          x-nullable: true
        semantic_groups:
          type: array
          items:
            $ref: '#/components/schemas/SemanticDiffGroup'
        depth:
          type: integer

    SemanticDiffGroup:
      type: object
      required:
        [
          event_type,
          diff_status,
          changed_fields,
          baseline_event,
          candidate_event,
        ]
      properties:
        event_type:
          $ref: '#/components/schemas/CompareSemanticEventType'
        diff_status:
          $ref: '#/components/schemas/CompareDiffStatus'
        match_source:
          $ref: '#/components/schemas/CompareMatchSource'
        match_reason:
          type: string
        changed_fields:
          type: array
          items:
            type: string
        baseline_event:
          allOf:
