        sequence_no:
          type: integer
          format: int32
        event_type:
          type: string
        payload:
          type: object
        created_at:
          type: string
          format: date-time

    EngineRunHistoryResponse:
      type: object
      required: [events, has_more]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EngineHistoryEvent'
        has_more:
          type: boolean
        next_after:
          type: integer
        expired:
          type: boolean
          description: True when retained engine history for the run has been purged.

    EnginePurgeRequest:
      type: object
      required: [mode]
      properties:
        mode:
          $ref: '#/components/schemas/EnginePurgeMode'

    EnginePurgeResponse:
      type: object
      required: [run_id, mode, projection_state, deleted]
      properties:
