      type: object
      properties:
        key:
          type: string
        name:
          type: string
        metadata:
          type: object

    EngineStartTrace:
      type: object
      properties:
        name:
          type: string
        user_id:
          type: string
        tags:
          type: array
          items:
            type: string
        environment:
          type: string
        release:
          type: string
        metadata:
          type: object

    EngineStartRunRequest:
      type: object
