name: E2E Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: continua
          POSTGRES_PASSWORD: continua
          POSTGRES_DB: continua
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.11'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Build server
        run: go build -o bin/continua ./cmd/continua

      - name: Run migrations
        run: ./bin/continua migrate up
        env:
          DATABASE_URL: postgres://continua:continua@localhost:5432/continua?sslmode=disable

      - name: Start server
        run: |
          ./bin/continua serve &
          echo $! > server.pid
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8081/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
        env:
          DATABASE_URL: postgres://continua:continua@localhost:5432/continua?sslmode=disable
          PORT: 8081

      - name: Install Python SDK dependencies
        run: |
          cd sdks/python
          uv sync

      - name: Run E2E demo
        run: |
          cd sdks/python
          uv run python examples/e2e_demo.py
        env:
          CONTINUA_API_URL: http://localhost:8081

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Collect server logs
        if: failure()
        run: |
          echo "=== Server logs would be collected here ==="
          # In a real setup, you'd redirect server output to a file and cat it here
