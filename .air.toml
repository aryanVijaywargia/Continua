root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/continua"
  cmd = "go build -o ./tmp/continua ./cmd/continua"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "web", "node_modules", "testdata", "sdks", "engine", "tui"]
  exclude_file = []
  exclude_regex = ["_test\\.go$", "_gen\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "./tmp/continua serve"
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "2s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
