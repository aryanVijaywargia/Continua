# Continua currently loads runtime configuration from environment variables only.
# This file is a reference template for the env vars consumed by
# `internal/config/config.go`; the server does not read this YAML directly.
#
# Typical usage:
#   export DATABASE_URL="postgres://continua:continua@localhost:5432/continua?sslmode=disable"
#   export HOST="0.0.0.0"
#   export PORT="8080"
#   go run ./cmd/continua serve

environment:
  # Required
  DATABASE_URL: "postgres://continua:continua@localhost:5432/continua?sslmode=disable"

  # HTTP server
  HOST: "0.0.0.0"
  PORT: "8080"

  # Async ingest behavior
  INGEST_TRUE_ASYNC_DEFAULT: "false"
  INGEST_DEPENDENCY_RETRY_WINDOW: "15m"
  INGEST_FAILED_PAYLOAD_RETENTION: "168h"

  # River worker counts
  RIVER_QUEUE_INGEST_WORKERS: "4"
  RIVER_QUEUE_ROLLUP_WORKERS: "10"
  RIVER_QUEUE_MAINTENANCE_WORKERS: "1"
  RIVER_QUEUE_DEFAULT_WORKERS: "1"
