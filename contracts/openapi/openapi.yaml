              description: Terminal workflow result payload when available.
            failure:
              $ref: '#/components/schemas/EngineFailureSummary'
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            completed_at:
              type: string
              format: date-time

    Trace:
