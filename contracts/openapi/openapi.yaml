        cost_usd:
          type: number
        latency_ms:
          type: integer
        error_message:
          type: string
        model:
          type: string
        provider:
          type: string
        input:
          description: Span input payload (any valid JSON)
        input_truncated:
          type: boolean
        input_original_size_bytes:
          type: integer
          format: int64
        input_truncation_reason:
          type: string
        output:
          description: Span output payload (any valid JSON)
        output_truncated:
          type: boolean
        output_original_size_bytes:
          type: integer
          format: int64
        output_truncation_reason:
          type: string
        metadata:
          type: object

