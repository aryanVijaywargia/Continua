          type: string
          description: External session key. The server resolves/creates the internal session UUID from this value.
        name:
          type: string
        user_id:
          type: string
        tags:
          type: array
          items:
            type: string
        environment:
          type: string
        release:
          type: string
        metadata:
          type: object
        input:
          description: Trace input data (any JSON-serializable value)
        output:
          description: Trace output data (any JSON-serializable value)
        status:
          type: string
          enum: [running, completed, failed]
          default: running
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time

    IngestSpanInput:
      type: object
      required: [trace_id, span_id, name, start_time]
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        parent_span_id:
          type: string
          description: External parent span identifier
        name:
          type: string
        type:
          type: string
          enum: [default, llm, tool, agent, chain, retrieval, embedding, generation]
          default: default
        status:
          type: string
          enum: [running, completed, failed]
          default: running
        status_message:
          type: string
        level:
          type: string
          enum: [debug, default, warning, error]
          default: default
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        input:
          description: Span input data (any JSON-serializable value)
        output:
          description: Span output data (any JSON-serializable value)
        model:
          type: string
        provider:
          type: string
        prompt_tokens:
          type: integer
          format: int64
        completion_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
          deprecated: true
          description: Deprecated compatibility field. total_tokens-only payloads are rejected; provide prompt_tokens and/or completion_tokens for supported rollups.
        total_cost:
          type: number
          format: double
        metadata:
          type: object
        sequence:
          type: integer
          format: int32
        depth:
          type: integer
          format: int32

    IngestEventType:
      type: string
      enum: [log, error, exception, message, metric, custom, state_change, decision, effect, wait, snapshot_marker]

    IngestEventLevel:
      type: string
      enum: [debug, info, warning, error]

    IngestEventInput:
      type: object
      required: [trace_id, span_id]
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        event_type:
          allOf:
            - $ref: '#/components/schemas/IngestEventType'
          default: log
        level:
          allOf:
            - $ref: '#/components/schemas/IngestEventLevel'
          default: info
        event_ts:
          type: string
          format: date-time
        sequence:
          type: integer
          format: int32
        message:
          type: string
        payload:
          type: object
          description: >
            Free-form event payload. Semantic debugger conventions apply for some event types:
            `effect` may include reserved `effect_id`;
            `wait` may include reserved `wait_id`;
            `state_change` expects `key`, `old_value`, `new_value`, and optional `namespace`;
            `decision` expects `question`, `chosen`, and optional `alternatives` and `reasoning`;
            `snapshot_marker` is a debugger milestone event, not a checkpoint or resumability primitive,
            and conventionally uses `marker_kind` (a non-empty string; default vocabulary `milestone`)
            and `label` (a human-facing marker label).
        idempotency_key:
          type: string
          description: Optional key for event-level deduplication

    TimelineEventType:
      type: string
      enum:
        [
          log,
          error,
          exception,
          message,
          metric,
          custom,
          state_change,
          decision,
          effect,
          wait,
          snapshot_marker,
          span_started,
          span_completed,
          span_failed,
        ]

    TimelineEventSource:
      type: string
      enum: [explicit, synthetic]

    TimelineEventLevel:
      type: string
      enum: [debug, info, warning, error]

    TimelineEvent:
      type: object
      required: [id, trace_id, event_type, timestamp, source]
      properties:
        id:
          type: string
          description: Opaque event identifier. Explicit events use persisted UUIDs; synthetic events use deterministic span-based IDs.
        trace_id:
          type: string
          format: uuid
        span_id:
          type: string
          description: External span identifier for the related span
        span_name:
          type: string
        event_type:
          $ref: '#/components/schemas/TimelineEventType'
        timestamp:
          type: string
          format: date-time
        source:
          $ref: '#/components/schemas/TimelineEventSource'
        level:
          $ref: '#/components/schemas/TimelineEventLevel'
        sequence:
          type: integer
          format: int32
          description: Explicit-event ordering value used to preserve same-timestamp ingest order. Absent for synthetic events.
        message:
          type: string
        payload:
          type: object
          description: Event payload details for explicit events and helper metadata for synthetic events

    TimelineResponse:
      type: object
      required: [events, trace_status, has_more]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
        trace_status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
        has_more:
          type: boolean
        next_cursor:
          type: string
          description: Opaque cursor for the next page when `has_more` is true
        poll_cursor:
          type: string
          description: Opaque cursor representing the last event included in this response. Use for incremental polling even when `has_more` is false.
        engine:
          type: object
          required: [projection_state]
          properties:
            projection_state:
              $ref: '#/components/schemas/EngineProjectionState'

    IngestResponse:
      type: object
      required: [status, batch_key]
      properties:
        status:
          type: string
          enum: [ok, accepted, duplicate, failed]
          description: Processing status. "accepted" for async mode, "duplicate" indicates the batch was already processed.
        batch_key:
          type: string
        batch_id:
          type: string
          format: uuid
          description: |
            Stable batch identifier returned for sync responses, true-async acceptance,
            and duplicates. It may be omitted for the legacy Stage A fake-async path.
        trace_count:
          type: integer
          format: int32
        span_count:
          type: integer
          format: int32
        event_count:
          type: integer
          format: int32
        accepted_count:
          type: integer
          format: int32
        rejected_count:
          type: integer
          format: int32
        errors:
          type: array
          items:
            type: string

    BatchStatusResponse:
      type: object
      required: [batch_id, batch_key, status, attempt_count, server_received_at]
      properties:
        batch_id:
          type: string
          format: uuid
        batch_key:
          type: string
        status:
          type: string
          enum: [accepted, processing, completed, failed]
        attempt_count:
          type: integer
          format: int32
        server_received_at:
          type: string
          format: date-time
        processing_started_at:
          type: string
          format: date-time
        processing_completed_at:
          type: string
          format: date-time
        trace_count:
          type: integer
          format: int32
        span_count:
          type: integer
          format: int32
        event_count:
          type: integer
          format: int32
        accepted_count:
          type: integer
          format: int32
        rejected_count:
          type: integer
          format: int32
        last_error_code:
          type: string
        last_error_message:
          type: string
