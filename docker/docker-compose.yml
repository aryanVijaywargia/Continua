version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: continua
      POSTGRES_PASSWORD: continua
      POSTGRES_DB: continua
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continua"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ../server/schema/migrations:/migrations:ro
    entrypoint: migrate -path=/migrations -database "postgres://continua:continua@db:5432/continua?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["tools"]

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8243:8243"
    environment:
      CONTINUA_DB_HOST: db
      CONTINUA_DB_PORT: 5432
      CONTINUA_DB_USER: continua
      CONTINUA_DB_PASSWORD: continua
      CONTINUA_DB_NAME: continua
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CONTINUA_API_URL: http://localhost:8243
    depends_on:
      - server

volumes:
  postgres_data:
