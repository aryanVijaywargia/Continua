server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

proxy:
  enabled: true
  port: 8081
  providers:
    openai:
      base_url: https://api.openai.com
      enabled: true
    anthropic:
      base_url: https://api.anthropic.com
      enabled: true

database:
  driver: postgres
  postgres:
    host: localhost
    port: 5432
    user: continua
    password: ""
    database: continua
    ssl_mode: disable
    max_conns: 25
    min_conns: 5
  sqlite:
    path: ~/.continua/data.db

migrations:
  source: embed

security:
  api_key:
    enabled: true
    header: Authorization
    prefix: Bearer
  scrub_headers:
    - Authorization
    - Cookie
    - X-Api-Key

logging:
  level: info
  format: json

metrics:
  enabled: true
  path: /metrics
