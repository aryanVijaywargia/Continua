version: '3.8'

services:
  continua:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://continua:continua@postgres:5432/continua?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: continua
      POSTGRES_PASSWORD: continua
      POSTGRES_DB: continua
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continua"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
