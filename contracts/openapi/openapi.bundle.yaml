          type: string
          format: uuid
        span_id:
          type: string
          description: External span identifier for the related span
        span_name:
          type: string
        event_type:
          $ref: '#/components/schemas/TimelineEventType'
        timestamp:
          type: string
          format: date-time
        source:
          $ref: '#/components/schemas/TimelineEventSource'
        level:
          $ref: '#/components/schemas/TimelineEventLevel'
        sequence:
          type: integer
          format: int32
          description: Explicit-event ordering value used to preserve same-timestamp ingest order. Absent for synthetic events.
        message:
          type: string
        payload:
          type: object
          description: Event payload details for explicit events and helper metadata for synthetic events
    TimelineResponse:
      type: object
      required:
        - events
        - trace_status
        - has_more
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
        trace_status:
          type: string
          enum:
            - RUNNING
            - COMPLETED
            - FAILED
        has_more:
          type: boolean
        next_cursor:
          type: string
          description: Opaque cursor for the next page when `has_more` is true
        poll_cursor:
          type: string
          description: Opaque cursor representing the last event included in this response. Use for incremental polling even when `has_more` is false.
        engine:
          type: object
          required:
            - projection_state
          properties:
            projection_state:
              $ref: '#/components/schemas/EngineProjectionState'
    IngestResponse:
      type: object
      required:
        - status
        - batch_key
      properties:
        status:
          type: string
          enum:
            - ok
            - accepted
            - duplicate
            - failed
          description: Processing status. "accepted" for async mode, "duplicate" indicates the batch was already processed.
        batch_key:
          type: string
        batch_id:
          type: string
          format: uuid
          description: |
            Stable batch identifier returned for sync responses, true-async acceptance,
            and duplicates. It may be omitted for the legacy Stage A fake-async path.
        trace_count:
          type: integer
          format: int32
        span_count:
          type: integer
          format: int32
        event_count:
          type: integer
          format: int32
        accepted_count:
          type: integer
          format: int32
        rejected_count:
          type: integer
          format: int32
        errors:
          type: array
          items:
            type: string
    BatchStatusResponse:
      type: object
      required:
        - batch_id
        - batch_key
        - status
        - attempt_count
        - server_received_at
      properties:
        batch_id:
          type: string
          format: uuid
        batch_key:
          type: string
        status:
          type: string
          enum:
            - accepted
            - processing
            - completed
            - failed
        attempt_count:
          type: integer
          format: int32
        server_received_at:
          type: string
          format: date-time
        processing_started_at:
          type: string
          format: date-time
        processing_completed_at:
          type: string
          format: date-time
        trace_count:
          type: integer
          format: int32
        span_count:
          type: integer
          format: int32
        event_count:
          type: integer
          format: int32
        accepted_count:
          type: integer
          format: int32
        rejected_count:
          type: integer
          format: int32
        last_error_code:
          type: string
        last_error_message:
          type: string
