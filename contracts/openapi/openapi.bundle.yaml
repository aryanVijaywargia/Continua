      type: string
      enum:
        - debug
        - info
        - warning
        - error
    IngestEventInput:
      type: object
      required:
        - trace_id
        - span_id
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        event_type:
          allOf:
            - $ref: '#/components/schemas/IngestEventType'
          default: log
        level:
          allOf:
            - $ref: '#/components/schemas/IngestEventLevel'
