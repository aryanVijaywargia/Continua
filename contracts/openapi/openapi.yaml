          x-nullable: true
        candidate_event:
          allOf:
            - $ref: '#/components/schemas/CompareSemanticSummary'
          x-nullable: true

    CompareSpanSummary:
      type: object
      required: [id, span_id, name, kind, status, started_at]
      properties:
        id:
          type: string
          format: uuid
        span_id:
          type: string
        parent_span_id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [LLM, TOOL, CHAIN, AGENT, CUSTOM]
        status:
          type: string
          enum: [SCHEDULED, STARTED, COMPLETED, FAILED]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        tokens_in:
          type: integer
        tokens_out:
          type: integer
        cost_usd:
          type: number
        latency_ms:
          type: integer
        error_message:
          type: string
        model:
          type: string

    CompareSemanticSummary:
      type: object
      required: [id, event_type, timestamp]
      properties:
        id:
          type: string
