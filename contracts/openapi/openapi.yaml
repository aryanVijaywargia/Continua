          $ref: '#/components/schemas/CompareTraceHeader'
        summary:
          $ref: '#/components/schemas/CompareSummary'
        span_diffs:
          type: array
          items:
            $ref: '#/components/schemas/SpanDiffRow'

    CompareSessionHeader:
      type: object
