openapi: 3.1.0
info:
  title: Continua API
  version: 0.1.0
  description: AI Agent Observability Platform API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /
    description: Relative path (works with any host)

security:
  - auth0Bearer: []
  - apiKey: []

paths:
  # Note: /api/health is routed directly in Chi router (public, no auth)
  # It is NOT in OpenAPI to avoid middleware bypass complexity

  /v1/ingest:
    post:
      operationId: ingest
      summary: Ingest traces, spans, and events
      description: |
        Batch ingestion endpoint for traces, spans, and events.
        Supports idempotent processing via batch_key.
        Maximum request body size is 5MB.
      tags: [Ingest]
      security:
        - apiKey: []
      parameters:
        - name: sync
          in: query
          description: If true, wait for processing to complete before returning
          schema:
            type: boolean
            default: false
        - name: X-Continua-Async-Version
          in: header
          description: |
            Optional staged-rollout header for true async ingest.
            `2` enables durable async acceptance and background processing.
            Any other value is rejected with `400 unsupported_async_version`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '200':
          description: Batch processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '202':
          description: Batch accepted for asynchronous processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          description: Invalid request body or unsupported async version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Request body too large (exceeds 5MB limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeError'

  /v1/ingest/batches/{id}:
    get:
      operationId: getBatchStatus
      summary: Get ingest batch status
      description: Poll the processing status of an ingest batch.
      tags: [Ingest]
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs:
    post:
      operationId: startEngineRun
      summary: Start an engine workflow run
      tags: [Engine]
      parameters:
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineStartRunRequest'
      responses:
        '200':
          description: Engine run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineStartRunResponse'
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Duplicate, in-progress, or conflicting request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/activities/claim:
    post:
      operationId: claimRemoteActivityTasks
      summary: Claim remote engine activity tasks
      tags: [Engine]
      security:
        - apiKey: []
      parameters:
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineRemoteActivityClaimRequest'
      responses:
        '200':
          description: Claimed remote activity tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRemoteActivityClaimResponse'
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/activities/{id}/heartbeat:
    post:
      operationId: heartbeatRemoteActivityTask
      summary: Renew a remote activity task lease
      tags: [Engine]
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineRemoteActivityHeartbeatRequest'
      responses:
        '200':
          description: Renewed remote activity lease
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRemoteActivityHeartbeatResponse'
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Activity task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Activity task is not currently owned by this remote worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/activities/{id}/complete:
    post:
      operationId: completeRemoteActivityTask
      summary: Complete a remote activity task
      tags: [Engine]
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineRemoteActivityCompleteRequest'
      responses:
        '204':
          description: Activity task completed
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Activity task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Activity task is not currently owned by this remote worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/activities/{id}/fail:
    post:
      operationId: failRemoteActivityTask
      summary: Fail or retry a remote activity task
      tags: [Engine]
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineRemoteActivityFailRequest'
      responses:
        '204':
          description: Activity task failed or requeued
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Activity task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Activity task is not currently owned by this remote worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/instances/{instance_key}:
    get:
      operationId: getEngineInstance
      summary: Get an engine instance and current run
      tags: [Engine]
      parameters:
        - name: instance_key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Engine instance detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineInstanceResponse'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Instance not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}:
    get:
      operationId: getEngineRun
      summary: Get an engine run
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Engine run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/result:
    get:
      operationId: getEngineRunResult
      summary: Get the terminal result for an engine run
      description: |
        Returns the terminal result shape for the run.
        `COMPLETED` returns the workflow result payload.
        `CANCELLED` and `TERMINATED` return `result=null` with a populated `failure` object.
        Purged runs in `summary_only` and `journal_expired` continue to return the
        retained terminal shell instead of becoming `404`.
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Engine run terminal result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResultResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run not terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/pending-work:
    get:
      operationId: getEngineRunPendingWork
      summary: Get the durable pending work held by an engine run
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pending work snapshot for the run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnginePendingWorkResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/history:
    get:
      operationId: getEngineRunHistory
      summary: Get engine run history
      description: |
        Returns the durable engine history page for the run.
        Purged runs continue to return `200`; `journal_expired` runs include
        `expired=true` so clients can distinguish purged-empty from never-had-events.
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: after
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Engine run history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunHistoryResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/purge:
    post:
      operationId: purgeEngineRun
      summary: Purge projected detail and optionally retained history for an engine run
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnginePurgeRequest'
      responses:
        '200':
          description: Purge applied or already satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnginePurgeResponse'
        '400':
          description: Invalid request body or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run not terminal (`run_not_terminal`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/repair:
    post:
      operationId: repairEngineRun
      summary: Request projection repair for an engine run
      description: |
        Repair is asynchronous. Accepted repair requests only reopen projection by
        returning the run to `catching_up`; the separate `continua-engine`
        projector loop performs the rebuild later.
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Repair accepted or current state reported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRepairResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/projections/backfill:
    post:
      operationId: backfillEngineProjections
      summary: Preview or request bulk projection repair for engine runs
      description: |
        Identifies engine-backed traces eligible for projection repair and, when
        `dry_run=false`, reuses the existing per-run repair service to request
        catch-up. When `engine_projection_state` is omitted, only `summary_only`
        candidates are considered. Explicit `up_to_date`, `catching_up`, and
        `journal_expired` filters return zero eligible rows because those states
        are not valid backfill targets.
      tags: [Engine]
      parameters:
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineProjectionBackfillRequest'
      responses:
        '200':
          description: Backfill preview or apply result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineProjectionBackfillResponse'
        '400':
          description: Invalid request body, limit above 100, or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/signal:
    post:
      operationId: signalEngineRun
      summary: Deliver a signal to an engine run
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineSignalRunRequest'
      responses:
        '200':
          description: Signal accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineControlResponse'
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/suspend:
    post:
      operationId: suspendEngineRun
      summary: Suspend an engine run without terminating it
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Run suspended or current state returned for an idempotent no-op
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run is mid-activation (`run_not_suspendable`) or terminal (`run_terminal`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/resume:
    post:
      operationId: resumeEngineRun
      summary: Resume a suspended engine run
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Run resumed or current state returned for an idempotent no-op
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/cancel:
    post:
      operationId: cancelEngineRun
      summary: Request cancellation of an engine run
      description: |
        Cooperative cancellation request. Success only enqueues durable cancel intent and may wake the run;
        it does not guarantee the final outcome becomes `CANCELLED`.
        Workflow code decides between `COMPLETED` and `CANCELLED` by returning `workflow.ErrCancelled`.
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Cancel accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineControlResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/engine/runs/{run_id}/terminate:
    post:
      operationId: terminateEngineRun
      summary: Forcefully terminate an engine run
      tags: [Engine]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Run terminated or already terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResultResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/config:
    get:
      operationId: getAuthConfig
      summary: Get Auth0 runtime configuration for the debugger
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Runtime Auth0 bootstrap configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'

  /api/projects:
    get:
      operationId: listProjects
      summary: List all projects in the deployment
      description: |
        Returns every project the deployment knows about. Intended for the project-management
        view in the debugger UI. In a remote multi-tenant deployment, pair this with operator
        auth (Auth0) if API keys should not enumerate other projects.
      tags: [Projects]
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: API-key callers are forbidden from project management when Auth0 is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createProject
      summary: Create a new project and return its API key
      description: |
        Generates a fresh API key, stores its SHA-256 hash, and returns the plaintext key
        exactly once in the response. The key cannot be retrieved later; use rotate to
        replace it.
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created. The plaintext api_key is included in this response only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithKey'
        '400':
          description: Invalid request body (missing or empty name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: API-key callers are forbidden from project management when Auth0 is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/projects/{id}:
    patch:
      operationId: updateProject
      summary: Rename an existing project
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: API-key callers are forbidden from project management when Auth0 is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteProject
      summary: Delete a project and all its data
      description: |
        Permanently deletes the project row. Associated traces, sessions, spans, and
        payloads cascade via foreign keys. The seeded default project cannot be deleted.
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project deleted
        '403':
          description: API-key callers are forbidden from project management when Auth0 is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Project cannot be deleted (e.g. the default project)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/projects/{id}/rotate:
    post:
      operationId: rotateProjectAPIKey
      summary: Rotate the API key for a project
      description: |
        Generates a new API key, replaces the stored hash, and returns the plaintext
        key exactly once. The previous key stops working immediately.
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rotated key. The plaintext api_key is included only in this response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithKey'
        '403':
          description: API-key callers are forbidden from project management when Auth0 is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces:
    get:
      operationId: listTraces
      summary: List traces
      tags: [Traces]
      parameters:
        - $ref: '#/components/parameters/SelectedProjectId'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          description: Full-text search query (searches trace name and user_id)
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort traces by started time. Ignored when q is present.
          schema:
            type: string
            enum: [started_at]
        - name: sort_dir
          in: query
          description: Sort direction for started time. Ignored when q is present.
          schema:
            type: string
            enum: [asc, desc]
        - name: status
          in: query
          description: Filter by trace status
          schema:
            type: string
            enum: [running, completed, failed]
        - name: start_time_from
          in: query
          description: Filter traces starting at or after this time
          schema:
            type: string
            format: date-time
        - name: start_time_to
          in: query
          description: Filter traces starting at or before this time
          schema:
            type: string
            format: date-time
        - name: user_id
          in: query
          description: Filter by user ID
          schema:
            type: string
        - name: engine_instance_key
          in: query
          description: Filter by engine instance key
          schema:
            type: string
        - name: engine_run_id
          in: query
          description: Filter by engine run ID
          schema:
            type: string
            format: uuid
        - name: engine_definition_name
          in: query
          description: Filter by engine definition name
          schema:
            type: string
        - name: engine_definition_version
          in: query
          description: Filter by engine definition version
          schema:
            type: string
        - name: engine_run_status
          in: query
          description: Filter by engine run lifecycle status
          schema:
            type: string
            enum: [queued, running, waiting, suspended, completed, failed, cancelled, terminated, continued_as_new]
        - name: engine_parent_run_id
          in: query
          description: Filter by engine parent run ID
          schema:
            type: string
            format: uuid
        - name: engine_root_run_id
          in: query
          description: Filter by engine root run ID
          schema:
            type: string
            format: uuid
        - name: engine_child_key
          in: query
          description: Filter by engine child key
          schema:
            type: string
        - name: engine_child_depth
          in: query
          description: Filter by engine child depth
          schema:
            type: integer
        - name: engine_projection_state
          in: query
          description: Filter by engine projection state
          schema:
            $ref: '#/components/schemas/EngineProjectionState'
        - name: engine_only
          in: query
          description: When true, return only traces backed by an engine run.
          schema:
            type: boolean
            default: false
        - name: has_errors
          in: query
          description: Filter traces with errors (error_count > 0)
          schema:
            type: boolean
        - name: min_duration_ms
          in: query
          description: Filter traces with duration >= this value in milliseconds
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of traces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceList'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces/{id}:
    get:
      operationId: getTrace
      summary: Get a trace by ID
      tags: [Traces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SelectedProjectId'
      responses:
        '200':
          description: Trace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceDetail'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces/{id}/spans:
    get:
      operationId: listSpansByTrace
      summary: List spans for a trace
      tags: [Spans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SelectedProjectId'
      responses:
        '200':
          description: List of spans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanList'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces/{id}/events:
    get:
      operationId: getTraceEvents
      summary: List timeline events for a trace
      tags: [Traces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SelectedProjectId'
        - name: after
          in: query
          description: Opaque cursor returned by a previous timeline response
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of timeline events to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Timeline events for the trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineResponse'
        '400':
          description: Invalid cursor or pagination parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/SelectedProjectId'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: q
          in: query
          description: Search sessions by internal ID, external ID, user ID, or name
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter sessions by exact user ID
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort sessions by creation time or trace count. Ignored when q is present.
          schema:
            type: string
            enum: [created_at, trace_count]
        - name: sort_dir
          in: query
          description: Sort direction for the selected session sort field. Ignored when q is present.
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}:
    get:
      operationId: getSession
      summary: Get a session by ID
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SelectedProjectId'
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/narrative:
    get:
      operationId: getSessionNarrative
      summary: Get a session narrative by ID
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SelectedProjectId'
      responses:
        '200':
          description: Session narrative details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionNarrativeResponse'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/compare:
    get:
      operationId: getSessionCompare
      summary: Compare two traces within a session
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SelectedProjectId'
        - name: baseline_trace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: candidate_trace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session trace comparison details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCompareResponse'
        '400':
          description: Invalid comparison request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session or trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Comparison exceeds the supported span or semantic event ceiling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonTooLargeError'

components:
  parameters:
    SelectedProjectId:
      name: project_id
      in: query
      description: Required when authenticating with an Auth0 bearer token. Ignored when the request is already project-scoped by API key.
      schema:
        type: string
        format: uuid
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
    auth0Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Auth0 access token for debugger operator authentication

  schemas:
    AuthConfig:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        domain:
          type: string
        client_id:
          type: string
        audience:
          type: string
        public_demo_enabled:
          type: boolean
          description: Whether the deployment exposes a public read-only demo console.
        public_demo_label:
          type: string
          description: Display label for the public demo banner shown in the debugger shell.

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    Project:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectList:
      type: object
      required: [projects]
      properties:
        authenticated_project_id:
          type: string
          format: uuid
          description: Project bound to the current API key when the request is API-key authenticated. Omitted for operator or unauthenticated bootstrap requests.
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    ProjectWithKey:
      type: object
      required: [id, name, created_at, updated_at, api_key]
      description: Project metadata including the plaintext API key. Returned only on create or rotate; never retrievable again.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        api_key:
          type: string
          description: Plaintext API key. Display once and store securely; the server only retains a hash.

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable project name (1-100 characters)

    UpdateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    SizeError:
      type: object
      required: [error]
      description: Error response for 413 Payload Too Large
      properties:
        error:
          type: string
          description: Error message describing the size limit violation

    EngineProjectionState:
      type: string
      enum: [up_to_date, catching_up, summary_only, journal_expired]

    EngineProjectionBackfillAction:
      type: string
      enum: [would_repair, repair_requested, skipped]

    EnginePurgeMode:
      type: string
      enum: [projection_only, full]

    EngineRepairReason:
      type: string
      enum:
        - already_up_to_date
        - history_expired
        - no_events_to_project
        - repair_requested
        - already_catching_up

    EngineRunStatus:
      type: string
      enum: [QUEUED, RUNNING, WAITING, SUSPENDED, COMPLETED, FAILED, CANCELLED, TERMINATED, CONTINUED_AS_NEW]

    EngineTraceInfo:
      type: object
      required: [run_id, definition_name, definition_version, projection_state]
      properties:
        run_id:
          type: string
          format: uuid
        definition_name:
          type: string
        definition_version:
          type: string
        projection_state:
          $ref: '#/components/schemas/EngineProjectionState'
        instance_key:
          type: string
        status:
          $ref: '#/components/schemas/EngineRunStatus'
        wait_state:
          $ref: '#/components/schemas/EngineWaitState'
        pending_work:
          $ref: '#/components/schemas/EnginePendingWork'
        updated_at:
          type: string
          format: date-time
        parent_run_id:
          type: string
          format: uuid
        root_run_id:
          type: string
          format: uuid
        child_key:
          type: string
        child_depth:
          type: integer

    EngineWaitState:
      type: object
      additionalProperties: true
      properties:
        kind:
          type: string
        activity_key:
          type: string
        activity_type:
          type: string
        timer_key:
          type: string
        due_at:
          type: string
          format: date-time
        signal_name:
          type: string
        child_key:
          type: string

    EnginePendingWork:
      type: object
      required: [pending_activity_tasks, pending_inbox_items]
      properties:
        pending_activity_tasks:
          type: integer
          format: int64
        pending_inbox_items:
          type: integer
          format: int64

    EnginePendingActivityItem:
      type: object
      required: [task_id, activity_key, activity_type, status, available_at, attempt_count]
      properties:
        task_id:
          type: string
          format: uuid
        activity_key:
          type: string
        activity_type:
          type: string
        status:
          type: string
        available_at:
          type: string
          format: date-time
        attempt_count:
          type: integer
          format: int32

    EngineRemoteActivityClaimRequest:
      type: object
      required: [worker_id, activity_types]
      properties:
        worker_id:
          type: string
          minLength: 1
          maxLength: 128
        activity_types:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 256
        lease_duration:
          type: string
          description: Requested lease duration, e.g. 60s or 5m. The server clamps the effective value.
        max_tasks:
          type: integer
          minimum: 1
          maximum: 50

    EngineRemoteActivityTask:
      type: object
      required:
        - task_id
        - activity_key
        - activity_type
        - input
        - lease_expires_at
        - effective_lease_duration_ms
      properties:
        task_id:
          type: string
          format: uuid
        activity_key:
          type: string
        activity_type:
          type: string
        input:
          description: Activity input payload (any valid JSON)
        lease_expires_at:
          type: string
          format: date-time
        effective_lease_duration_ms:
          type: integer
          format: int64

    EngineRemoteActivityClaimResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/EngineRemoteActivityTask'

    EngineRemoteActivityHeartbeatRequest:
      type: object
      required: [worker_id]
      properties:
        worker_id:
          type: string
          minLength: 1
          maxLength: 128

    EngineRemoteActivityHeartbeatResponse:
      type: object
      required: [lease_expires_at, effective_lease_duration_ms]
      properties:
        lease_expires_at:
          type: string
          format: date-time
        effective_lease_duration_ms:
          type: integer
          format: int64

    EngineRemoteActivityCompleteRequest:
      type: object
      required: [worker_id, output]
      properties:
        worker_id:
          type: string
          minLength: 1
          maxLength: 128
        output:
          description: Activity output payload (any valid JSON)

    EngineRemoteActivityFailRequest:
      type: object
      required: [worker_id, error_code, error_message]
      properties:
        worker_id:
          type: string
          minLength: 1
          maxLength: 128
        error_code:
          type: string
          minLength: 1
          maxLength: 128
        error_message:
          type: string
          maxLength: 4096
        non_retryable:
          type: boolean
          default: false

    EnginePendingTimerItem:
      type: object
      required: [inbox_id, timer_key, status, available_at]
      properties:
        inbox_id:
          type: string
          format: uuid
        timer_key:
          type: string
        status:
          type: string
        available_at:
          type: string
          format: date-time

    EnginePendingSignalItem:
      type: object
      required: [inbox_id, signal_name, status, available_at]
      properties:
        inbox_id:
          type: string
          format: uuid
        signal_name:
          type: string
        status:
          type: string
        available_at:
          type: string
          format: date-time

    EnginePendingWorkResponse:
      type: object
      required: [run_id, current_wait, activities, timers, signals, pending_activity_tasks, pending_inbox_items]
      properties:
        run_id:
          type: string
          format: uuid
        current_wait:
          description: Current synthesized wait state from the run row when present.
          allOf:
            - $ref: '#/components/schemas/EngineWaitState'
          x-nullable: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/EnginePendingActivityItem'
        timers:
          type: array
          items:
            $ref: '#/components/schemas/EnginePendingTimerItem'
        signals:
          type: array
          items:
            $ref: '#/components/schemas/EnginePendingSignalItem'
        pending_activity_tasks:
          type: integer
          format: int64
        pending_inbox_items:
          type: integer
          format: int64

    EngineProjectionBackfillRequest:
      type: object
      properties:
        dry_run:
          type: boolean
          default: false
        limit:
          type: integer
          default: 50
          maximum: 100
        older_than:
          type: string
          format: date-time
        engine_instance_key:
          type: string
        engine_definition_name:
          type: string
        engine_run_status:
          $ref: '#/components/schemas/EngineRunStatus'
        engine_projection_state:
          allOf:
            - $ref: '#/components/schemas/EngineProjectionState'
          description: |
            Defaults to `summary_only` when omitted. Explicit `up_to_date`,
            `catching_up`, and `journal_expired` return zero eligible rows.

    EngineProjectionBackfillRunResult:
      type: object
      required: [run_id, trace_id, projection_state, action]
      properties:
        run_id:
          type: string
          format: uuid
        trace_id:
          type: string
