version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/aryanVijaywargia/Continua/packages/proto-go

plugins:
  # ═══════════════════════════════════════════════════════════════
  # Go — PINNED VERSIONS
  # ═══════════════════════════════════════════════════════════════
  - remote: buf.build/protocolbuffers/go:v1.35.2
    out: ../packages/proto-go
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: ../packages/proto-go
    opt: paths=source_relative

  # ═══════════════════════════════════════════════════════════════
  # TypeScript — PINNED VERSIONS
  # ═══════════════════════════════════════════════════════════════
  - remote: buf.build/bufbuild/es:v1.10.0
    out: ../packages/api-client/src/generated
  - remote: buf.build/connectrpc/es:v1.4.0
    out: ../packages/api-client/src/generated

  # ═══════════════════════════════════════════════════════════════
  # Python — PINNED VERSIONS
  # ═══════════════════════════════════════════════════════════════
  - remote: buf.build/protocolbuffers/python:v27.3
    out: ../sdks/python/src/continua/_generated
  - remote: buf.build/grpc/python:v1.66.1
    out: ../sdks/python/src/continua/_generated
