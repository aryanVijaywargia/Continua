version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/postgres/"
    gen:
      go:
        package: "platform"
        out: "../gen/go/platform"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type: "json.RawMessage"
