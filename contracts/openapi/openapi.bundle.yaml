openapi: 3.1.0
info:
  title: Continua API
  version: 0.1.0
  description: AI Agent Observability Platform API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /
    description: Relative path (works with any host)
security:
  - apiKey: []
paths:
  /v1/ingest:
    post:
      operationId: ingest
      summary: Ingest traces, spans, and events
      description: |
        Batch ingestion endpoint for traces, spans, and events.
        Supports idempotent processing via batch_key.
        Maximum request body size is 5MB.
      tags:
        - Ingest
      parameters:
        - name: sync
          in: query
          description: If true, wait for processing to complete before returning
          schema:
            type: boolean
            default: false
        - name: X-Continua-Async-Version
          in: header
          description: |
            Optional staged-rollout header for true async ingest.
            `2` enables durable async acceptance and background processing.
            Any other value is rejected with `400 unsupported_async_version`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '200':
          description: Batch processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '202':
          description: Batch accepted for asynchronous processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          description: Invalid request body or unsupported async version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Request body too large (exceeds 5MB limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeError'
  /v1/ingest/batches/{id}:
    get:
      operationId: getBatchStatus
      summary: Get ingest batch status
      description: Poll the processing status of an ingest batch.
      tags:
        - Ingest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs:
    post:
      operationId: startEngineRun
      summary: Start an engine workflow run
      tags:
        - Engine
      parameters:
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineStartRunRequest'
      responses:
        '200':
          description: Engine run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineStartRunResponse'
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Duplicate, in-progress, or conflicting request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/instances/{instance_key}:
    get:
      operationId: getEngineInstance
      summary: Get an engine instance and current run
      tags:
        - Engine
      parameters:
        - name: instance_key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Engine instance detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineInstanceResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Instance not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}:
    get:
      operationId: getEngineRun
      summary: Get an engine run
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Engine run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}/result:
    get:
      operationId: getEngineRunResult
      summary: Get the terminal result for an engine run
      description: |
        Returns the terminal result shape for the run.
        `COMPLETED` returns the workflow result payload.
        `CANCELLED` and `TERMINATED` return `result=null` with a populated `failure` object.
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Engine run terminal result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResultResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run not terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}/pending-work:
    get:
      operationId: getEngineRunPendingWork
      summary: Get the durable pending work held by an engine run
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pending work snapshot for the run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnginePendingWorkResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}/history:
    get:
      operationId: getEngineRunHistory
      summary: Get engine run history
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: after
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Engine run history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunHistoryResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}/signal:
    post:
      operationId: signalEngineRun
      summary: Deliver a signal to an engine run
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineSignalRunRequest'
      responses:
        '200':
          description: Signal accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineControlResponse'
        '400':
          description: Invalid request or missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}/cancel:
    post:
      operationId: cancelEngineRun
      summary: Request cancellation of an engine run
      description: |
        Cooperative cancellation request. Success only enqueues durable cancel intent and may wake the run;
        it does not guarantee the final outcome becomes `CANCELLED`.
        Workflow code decides between `COMPLETED` and `CANCELLED` by returning `workflow.ErrCancelled`.
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Cancel accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineControlResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Run terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/engine/runs/{run_id}/terminate:
    post:
      operationId: terminateEngineRun
      summary: Forcefully terminate an engine run
      tags:
        - Engine
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Continua-Engine-Preview
          in: header
          required: true
          description: Required preview header for mutating engine routes.
          schema:
            type: string
      responses:
        '200':
          description: Run terminated or already terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineRunResultResponse'
        '400':
          description: Missing preview header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Run not found or engine API disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/traces:
    get:
      operationId: listTraces
      summary: List traces
      tags:
        - Traces
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          description: Full-text search query (searches trace name and user_id)
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort traces by started time. Ignored when q is present.
          schema:
            type: string
            enum:
              - started_at
        - name: sort_dir
          in: query
          description: Sort direction for started time. Ignored when q is present.
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: status
          in: query
          description: Filter by trace status
          schema:
            type: string
            enum:
              - running
              - completed
              - failed
        - name: start_time_from
          in: query
          description: Filter traces starting at or after this time
          schema:
            type: string
            format: date-time
        - name: start_time_to
          in: query
          description: Filter traces starting at or before this time
          schema:
            type: string
            format: date-time
        - name: user_id
          in: query
          description: Filter by user ID
          schema:
            type: string
        - name: has_errors
          in: query
          description: Filter traces with errors (error_count > 0)
          schema:
            type: boolean
        - name: min_duration_ms
          in: query
          description: Filter traces with duration >= this value in milliseconds
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of traces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/traces/{id}:
    get:
      operationId: getTrace
      summary: Get a trace by ID
      tags:
        - Traces
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceDetail'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/traces/{id}/spans:
    get:
      operationId: listSpansByTrace
      summary: List spans for a trace
      tags:
        - Spans
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of spans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/traces/{id}/events:
    get:
      operationId: getTraceEvents
      summary: List timeline events for a trace
      tags:
        - Traces
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: after
          in: query
          description: Opaque cursor returned by a previous timeline response
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of timeline events to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Timeline events for the trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineResponse'
        '400':
          description: Invalid cursor or pagination parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags:
        - Sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: q
          in: query
          description: Search sessions by external ID or name
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter sessions by exact user ID
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort sessions by creation time or trace count. Ignored when q is present.
          schema:
            type: string
            enum:
              - created_at
              - trace_count
        - name: sort_dir
          in: query
          description: Sort direction for the selected session sort field. Ignored when q is present.
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/sessions/{id}:
    get:
      operationId: getSession
      summary: Get a session by ID
      tags:
        - Sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/sessions/{id}/narrative:
    get:
      operationId: getSessionNarrative
      summary: Get a session narrative by ID
      tags:
        - Sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session narrative details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionNarrativeResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/sessions/{id}/compare:
    get:
      operationId: getSessionCompare
      summary: Compare two traces within a session
      tags:
        - Sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: baseline_trace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: candidate_trace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session trace comparison details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCompareResponse'
        '400':
          description: Invalid comparison request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session or trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Comparison exceeds the supported span or semantic event ceiling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonTooLargeError'
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    SizeError:
      type: object
      required:
        - error
      description: Error response for 413 Payload Too Large
      properties:
        error:
          type: string
          description: Error message describing the size limit violation
    EngineProjectionState:
      type: string
      enum:
        - up_to_date
        - catching_up
        - summary_only
        - journal_expired
    EngineRunStatus:
      type: string
      enum:
        - QUEUED
        - RUNNING
        - WAITING
        - COMPLETED
        - FAILED
        - CANCELLED
        - TERMINATED
    EngineTraceInfo:
      type: object
      required:
        - run_id
        - definition_name
        - definition_version
        - projection_state
      properties:
        run_id:
          type: string
          format: uuid
        definition_name:
          type: string
        definition_version:
          type: string
        projection_state:
          $ref: '#/components/schemas/EngineProjectionState'
    EngineWaitState:
      type: object
      additionalProperties: true
      properties:
        kind:
          type: string
        activity_key:
          type: string
        activity_type:
          type: string
        timer_key:
          type: string
        due_at:
          type: string
          format: date-time
        signal_name:
          type: string
    EnginePendingWork:
      type: object
      required:
        - pending_activity_tasks
        - pending_inbox_items
      properties:
        pending_activity_tasks:
          type: integer
          format: int64
        pending_inbox_items:
          type: integer
          format: int64
    EnginePendingActivityItem:
      type: object
      required:
        - task_id
        - activity_key
        - activity_type
        - status
        - available_at
        - attempt_count
      properties:
        task_id:
          type: string
          format: uuid
        activity_key:
          type: string
        activity_type:
          type: string
        status:
          type: string
        available_at:
          type: string
          format: date-time
        attempt_count:
          type: integer
          format: int32
    EnginePendingTimerItem:
      type: object
      required:
        - inbox_id
        - timer_key
        - status
        - available_at
      properties:
        inbox_id:
          type: string
          format: uuid
        timer_key:
          type: string
        status:
          type: string
        available_at:
          type: string
          format: date-time
    EnginePendingSignalItem:
      type: object
      required:
        - inbox_id
        - signal_name
        - status
        - available_at
      properties:
        inbox_id:
          type: string
          format: uuid
        signal_name:
          type: string
        status:
          type: string
        available_at:
          type: string
          format: date-time
    EnginePendingWorkResponse:
      type: object
      required:
        - run_id
        - current_wait
        - activities
        - timers
        - signals
        - pending_activity_tasks
        - pending_inbox_items
      properties:
        run_id:
          type: string
          format: uuid
        current_wait:
          description: Current synthesized wait state from the run row when present.
          allOf:
            - $ref: '#/components/schemas/EngineWaitState'
          x-nullable: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/EnginePendingActivityItem'
        timers:
          type: array
          items:
            $ref: '#/components/schemas/EnginePendingTimerItem'
        signals:
          type: array
          items:
            $ref: '#/components/schemas/EnginePendingSignalItem'
        pending_activity_tasks:
          type: integer
          format: int64
        pending_inbox_items:
          type: integer
          format: int64
    EngineFailureSummary:
      type: object
      required:
        - error_code
        - error_message
        - status
      properties:
        error_code:
          type: string
        error_message:
          type: string
        status:
