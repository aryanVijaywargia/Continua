        parent_span_id:
          type: string
          description: External parent span identifier
        name:
          type: string
        kind:
          type: string
          enum: [LLM, TOOL, CHAIN, AGENT, CUSTOM]
        status:
          type: string
          enum: [SCHEDULED, STARTED, COMPLETED, FAILED]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        tokens_in:
