  <rect x="40" y="80" width="320" height="160" rx="14" fill="#ffffff" stroke="#c0c7d6" stroke-width="1"></rect>

  
  <g stroke="#c0c7d6" stroke-width="1" font-family="IBM Plex Mono, monospace" font-size="8" fill="#707785">
