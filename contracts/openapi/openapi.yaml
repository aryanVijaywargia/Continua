        instance_key:
          type: string
        trace_id:
          type: string

    EngineInstanceResponse:
      type: object
      required: [instance_id, instance_key, definition_name, status, current_run]
      properties:
        instance_id:
          type: string
          format: uuid
        instance_key:
          type: string
        definition_name:
          type: string
        status:
          type: string
        current_run:
          $ref: '#/components/schemas/EngineRunSummary'

    EngineRunResponse:
      description: |
