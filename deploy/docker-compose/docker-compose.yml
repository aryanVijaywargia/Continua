services:
  continua:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://continua:continua@postgres:5432/continua?sslmode=disable
      - PUBLIC_DEMO_ENABLED=1
      - PUBLIC_DEMO_PROJECT_ID=11111111-1111-4111-8111-111111111111
      - PUBLIC_DEMO_LABEL=Sample data
    command: ["sh", "-c", "continua migrate up && exec continua serve"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  demo-seed:
    image: python:3.12-slim
    profiles:
      - seed
    working_dir: /app
    volumes:
      - ../..:/app
    environment:
      - DATABASE_URL=postgres://continua:continua@postgres:5432/continua?sslmode=disable
      - CONTINUA_API_URL=http://continua:8080
      - CONTINUA_APP_URL=http://localhost:8080
      - PUBLIC_DEMO_PROJECT_ID=11111111-1111-4111-8111-111111111111
      - CONTINUA_DEMO_PROJECT_ID=11111111-1111-4111-8111-111111111111
      - CONTINUA_DEMO_PROJECT_NAME=Public Demo Project
      - CONTINUA_DEMO_API_KEY=continua-demo-local
      - CONTINUA_DEMO_RUN_ID=public-demo
      - UV_PROJECT_ENVIRONMENT=/tmp/continua-seed-venv
    command:
      - sh
      - -c
      - |
        apt-get update
        apt-get install -y --no-install-recommends postgresql-client openssl ca-certificates
        pip install --no-cache-dir uv
        ./scripts/seed-demo.sh
    depends_on:
      continua:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: continua
      POSTGRES_PASSWORD: continua
      POSTGRES_DB: continua
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continua"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
