<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" fill="none" stroke-linecap="round" stroke-linejoin="round" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="dx-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#005cab" stop-opacity="0.10"></stop>
      <stop offset="62%" stop-color="#005cab" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="dx-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="rgba(192,199,214,0.28)" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#dx-grid)"></rect>
  <rect width="400" height="300" fill="url(#dx-glow)"></rect>

  
  <line x1="40" y1="230" x2="360" y2="230" stroke="#c0c7d6" stroke-width="1"></line>
  
  <g stroke="#c0c7d6" stroke-width="1">
    <line x1="80" y1="228" x2="80" y2="234"></line>
    <line x1="160" y1="228" x2="160" y2="234"></line>
    <line x1="200" y1="228" x2="200" y2="234"></line>
    <line x1="280" y1="228" x2="280" y2="234"></line>
    <line x1="340" y1="228" x2="340" y2="234"></line>
  </g>

  
  <path d="M 40 180 C 80 180, 100 100, 160 100 S 180 180, 200 180" stroke="#005cab" stroke-width="2"></path>

  
  <rect x="195" y="70" width="30" height="140" fill="#ba1a1a" fill-opacity="0.06" stroke="#ba1a1a" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 4" rx="4"></rect>
  <text x="210" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#ba1a1a" letter-spacing="1.5">CRASH</text>

  
  <path d="M 220 180 C 240 180, 260 100, 300 100 S 340 180, 360 180" stroke="#0075d6" stroke-width="2" stroke-dasharray="1 0"></path>

  
  <g stroke="#1b1b1b" stroke-width="1.5" fill="#ffffff">
    <circle cx="80" cy="158" r="5"></circle>
    <circle cx="160" cy="100" r="5"></circle>
  </g>
  <g stroke="#0075d6" stroke-width="1.5" fill="#0075d6">
    <circle cx="300" cy="100" r="5"></circle>
  </g>
  
  <circle cx="220" cy="180" r="3" fill="#0075d6"></circle>
  <path d="M216 176 L220 180 L224 176" stroke="#0075d6" stroke-width="1.5"></path>

  
  <text x="80" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#707785" letter-spacing="1">t=0</text>
  <text x="160" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#707785" letter-spacing="1">CHECKPOINT</text>
  <text x="280" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#707785" letter-spacing="1">RESUME</text>
  <text x="340" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#707785" letter-spacing="1">DONE</text>

  
  <text x="40" y="40" font-size="10" font-weight="900" letter-spacing="2" fill="#707785">DURABLE EXECUTION</text>
</svg>