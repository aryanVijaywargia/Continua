name: Publish Python SDK

on:
  push:
    tags:
      - 'python-sdk-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: sdks/python
        run: uv sync

      - name: Type check
        working-directory: sdks/python
        run: uv run mypy src/

      - name: Run tests
        working-directory: sdks/python
        run: uv run pytest

      - name: Build package
        working-directory: sdks/python
        run: uv build

      - name: Publish package
        working-directory: sdks/python
        run: uv publish
