        - $ref: '#/components/schemas/EngineRunSummary'
        - type: object
          required: [instance_id]
          properties:
            instance_id:
              type: string
              format: uuid

    EngineRunResultResponse:
      type: object
      required: [run_id, status, result]
      properties:
        run_id:
          type: string
          format: uuid
        continued_from_run_id:
          type: string
          format: uuid
        continued_to_run_id:
          type: string
          format: uuid
        continued_from_trace_id:
          type: string
        continued_to_trace_id:
          type: string
        status:
          $ref: '#/components/schemas/EngineRunStatus'
        result:
          description: |
