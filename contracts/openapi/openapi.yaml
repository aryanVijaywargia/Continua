      properties:
        spans:
          type: array
          items:
            $ref: '#/components/schemas/Span'

    Session:
      type: object
      required: [id, external_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        external_id:
          type: string
          description: Human-readable external session identifier used by SDKs
        name:
          type: string
        user_id:
          type: string
          description: User identifier for this session
        trace_count:
          type: integer
          description: Number of traces in this session
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    SessionList:
      type: object
      required: [sessions, total]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
