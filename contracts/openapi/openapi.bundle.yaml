openapi: 3.1.0
info:
  title: Continua API
  version: 0.1.0
  description: AI Agent Observability Platform API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /
    description: Relative path (works with any host)
security:
  - apiKey: []
paths:
  /v1/ingest:
    post:
      operationId: ingest
      summary: Ingest traces, spans, and events
      description: |
        Batch ingestion endpoint for traces, spans, and events.
        Supports idempotent processing via batch_key.
        Maximum request body size is 5MB.
      tags:
        - Ingest
      parameters:
        - name: sync
          in: query
          description: If true, wait for processing to complete before returning
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '200':
          description: Batch processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Request body too large (exceeds 5MB limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeError'
  /api/traces:
    get:
      operationId: listTraces
      summary: List traces
      tags:
        - Traces
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of traces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/traces/{id}:
    get:
      operationId: getTrace
      summary: Get a trace by ID
      tags:
        - Traces
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trace'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/traces/{id}/spans:
    get:
      operationId: listSpansByTrace
      summary: List spans for a trace
      tags:
        - Spans
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of spans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags:
        - Sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    SizeError:
      type: object
      required:
        - error
      description: Error response for 413 Payload Too Large
      properties:
        error:
          type: string
          description: Error message describing the size limit violation
    Trace:
      type: object
      required:
        - id
        - name
        - status
        - started_at
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum:
            - RUNNING
            - COMPLETED
            - FAILED
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        total_cost_usd:
          type: number
        error_count:
          type: integer
          description: Count of failed spans in this trace
        metadata:
          type: object
    TraceList:
      type: object
      required:
        - traces
        - total
      properties:
        traces:
          type: array
          items:
            $ref: '#/components/schemas/Trace'
        total:
          type: integer
    Span:
      type: object
      required:
        - id
        - trace_id
        - span_id
        - name
        - kind
        - status
        - started_at
      properties:
        id:
          type: string
          format: uuid
        trace_id:
          type: string
          format: uuid
        span_id:
          type: string
          description: External span identifier (used for parent-child relationships)
        parent_span_id:
          type: string
          description: External parent span identifier
        name:
          type: string
        kind:
          type: string
          enum:
            - LLM
            - TOOL
            - CHAIN
            - AGENT
            - CUSTOM
        status:
          type: string
          enum:
            - SCHEDULED
            - STARTED
            - COMPLETED
            - FAILED
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        tokens_in:
          type: integer
        tokens_out:
          type: integer
        cost_usd:
          type: number
        latency_ms:
          type: integer
        error_message:
          type: string
        input:
          description: Span input payload (any valid JSON)
        output:
          description: Span output payload (any valid JSON)
        metadata:
          type: object
    SpanList:
      type: object
      required:
        - spans
      properties:
        spans:
          type: array
          items:
            $ref: '#/components/schemas/Span'
    Session:
      type: object
      required:
        - id
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
    SessionList:
      type: object
      required:
        - sessions
        - total
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        total:
          type: integer
    IngestRequest:
      type: object
      required:
        - batch_key
      properties:
        batch_key:
          type: string
          description: Unique identifier for idempotency. Same batch_key returns success without reprocessing.
        traces:
          type: array
          items:
            $ref: '#/components/schemas/IngestTraceInput'
        spans:
          type: array
          items:
            $ref: '#/components/schemas/IngestSpanInput'
        events:
          type: array
          items:
            $ref: '#/components/schemas/IngestEventInput'
    IngestTraceInput:
      type: object
      required:
        - trace_id
      properties:
        trace_id:
          type: string
          description: External trace identifier
        session_id:
          type: string
          format: uuid
        name:
          type: string
        user_id:
          type: string
        tags:
          type: array
          items:
            type: string
        environment:
          type: string
        release:
          type: string
        metadata:
          type: object
        input:
          description: Trace input data (any JSON-serializable value)
        output:
          description: Trace output data (any JSON-serializable value)
        status:
          type: string
          enum:
            - running
            - completed
            - failed
          default: running
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
    IngestSpanInput:
      type: object
      required:
        - trace_id
        - span_id
        - name
        - start_time
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        parent_span_id:
          type: string
          description: External parent span identifier
        name:
          type: string
        type:
          type: string
          enum:
            - default
            - llm
            - tool
            - agent
            - chain
            - retrieval
            - embedding
            - generation
          default: default
        status:
          type: string
          enum:
            - running
            - completed
            - failed
          default: running
        status_message:
          type: string
        level:
          type: string
          enum:
            - debug
            - default
            - warning
            - error
          default: default
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        input:
          description: Span input data (any JSON-serializable value)
        output:
          description: Span output data (any JSON-serializable value)
        model:
          type: string
        provider:
          type: string
        prompt_tokens:
          type: integer
          format: int64
        completion_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        total_cost:
          type: number
          format: double
        metadata:
          type: object
        sequence:
          type: integer
          format: int32
        depth:
          type: integer
          format: int32
    IngestEventInput:
      type: object
      required:
        - trace_id
        - span_id
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        event_type:
          type: string
          enum:
            - log
            - error
            - exception
            - message
            - metric
            - custom
          default: log
        level:
          type: string
          enum:
            - debug
            - info
            - warning
            - error
          default: info
        event_ts:
          type: string
          format: date-time
        sequence:
          type: integer
          format: int32
        message:
          type: string
        payload:
          type: object
        idempotency_key:
          type: string
          description: Optional key for event-level deduplication
    IngestResponse:
      type: object
      required:
        - status
        - batch_key
      properties:
        status:
          type: string
          enum:
            - ok
            - accepted
            - duplicate
            - failed
          description: Processing status. "accepted" for async mode, "duplicate" indicates the batch was already processed.
        batch_key:
          type: string
        trace_count:
          type: integer
          format: int32
        span_count:
          type: integer
          format: int32
        event_count:
          type: integer
          format: int32
        accepted_count:
          type: integer
          format: int32
        rejected_count:
          type: integer
          format: int32
        errors:
          type: array
          items:
            type: string
