apiVersion: apps/v1
kind: Deployment
metadata:
  name: continua
  labels:
    app: continua
spec:
  replicas: 1
  selector:
    matchLabels:
      app: continua
  template:
    metadata:
      labels:
        app: continua
    spec:
      containers:
        - name: continua
          image: continua:latest
          ports:
            - containerPort: 8080
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: continua-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
