          candidate_semantic_count,
          max_spans,
          max_semantic_events,
        ]
      properties:
        baseline_span_count:
          type: integer
        candidate_span_count:
          type: integer
        baseline_semantic_count:
          type: integer
        candidate_semantic_count:
          type: integer
        max_spans:
          type: integer
        max_semantic_events:
          type: integer

    SessionCompareResponse:
      type: object
