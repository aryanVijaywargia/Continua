openapi: 3.1.0
info:
  title: Continua API
  version: 0.1.0
  description: AI Agent Observability Platform API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /
    description: Relative path (works with any host)

security:
  - apiKey: []

paths:
  # Note: /api/health is routed directly in Chi router (public, no auth)
  # It is NOT in OpenAPI to avoid middleware bypass complexity

  /v1/ingest:
    post:
      operationId: ingest
      summary: Ingest traces, spans, and events
      description: |
        Batch ingestion endpoint for traces, spans, and events.
        Supports idempotent processing via batch_key.
        Maximum request body size is 5MB.
      tags: [Ingest]
      parameters:
        - name: sync
          in: query
          description: If true, wait for processing to complete before returning
          schema:
            type: boolean
            default: false
        - name: X-Continua-Async-Version
          in: header
          description: |
            Optional staged-rollout header for true async ingest.
            `2` enables durable async acceptance and background processing.
            Any other value is rejected with `400 unsupported_async_version`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '200':
          description: Batch processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '202':
          description: Batch accepted for asynchronous processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          description: Invalid request body or unsupported async version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Request body too large (exceeds 5MB limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeError'

  /v1/ingest/batches/{id}:
    get:
      operationId: getBatchStatus
      summary: Get ingest batch status
      description: Poll the processing status of an ingest batch.
      tags: [Ingest]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces:
    get:
      operationId: listTraces
      summary: List traces
      tags: [Traces]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          description: Full-text search query (searches trace name and user_id)
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort traces by started time. Ignored when q is present.
          schema:
            type: string
            enum: [started_at]
        - name: sort_dir
          in: query
          description: Sort direction for started time. Ignored when q is present.
          schema:
            type: string
            enum: [asc, desc]
        - name: status
          in: query
          description: Filter by trace status
          schema:
            type: string
            enum: [running, completed, failed]
        - name: start_time_from
          in: query
          description: Filter traces starting at or after this time
          schema:
            type: string
            format: date-time
        - name: start_time_to
          in: query
          description: Filter traces starting at or before this time
          schema:
            type: string
            format: date-time
        - name: user_id
          in: query
          description: Filter by user ID
          schema:
            type: string
        - name: has_errors
          in: query
          description: Filter traces with errors (error_count > 0)
          schema:
            type: boolean
        - name: min_duration_ms
          in: query
          description: Filter traces with duration >= this value in milliseconds
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of traces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces/{id}:
    get:
      operationId: getTrace
      summary: Get a trace by ID
      tags: [Traces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceDetail'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces/{id}/spans:
    get:
      operationId: listSpansByTrace
      summary: List spans for a trace
      tags: [Spans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of spans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/traces/{id}/events:
    get:
      operationId: getTraceEvents
      summary: List timeline events for a trace
      tags: [Traces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: after
          in: query
          description: Opaque cursor returned by a previous timeline response
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of timeline events to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Timeline events for the trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineResponse'
        '400':
          description: Invalid cursor or pagination parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags: [Sessions]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: q
          in: query
          description: Search sessions by external ID or name
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter sessions by exact user ID
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort sessions by creation time or trace count. Ignored when q is present.
          schema:
            type: string
            enum: [created_at, trace_count]
        - name: sort_dir
          in: query
          description: Sort direction for the selected session sort field. Ignored when q is present.
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}:
    get:
      operationId: getSession
      summary: Get a session by ID
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/narrative:
    get:
      operationId: getSessionNarrative
      summary: Get a session narrative by ID
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session narrative details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionNarrativeResponse'
        '401':
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    SizeError:
      type: object
      required: [error]
      description: Error response for 413 Payload Too Large
      properties:
        error:
          type: string
          description: Error message describing the size limit violation

    Trace:
      type: object
      required: [id, name, status, started_at]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        session_external_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        total_cost_usd:
          type: number
        error_count:
          type: integer
          description: Count of failed spans in this trace
        metadata:
          type: object

    TraceDetail:
      allOf:
        - $ref: '#/components/schemas/Trace'
        - type: object
          properties:
            trace_id:
              type: string
            user_id:
              type: string
            tags:
              type: array
              items:
                type: string
            environment:
              type: string
            release:
              type: string
            input:
              description: Trace input payload (any valid JSON)
            output:
              description: Trace output payload (any valid JSON)

    TraceList:
      type: object
      required: [traces, total]
      properties:
        traces:
          type: array
          items:
            $ref: '#/components/schemas/Trace'
        total:
          type: integer

    Span:
      type: object
      required: [id, trace_id, span_id, name, kind, status, started_at]
      properties:
        id:
          type: string
          format: uuid
        trace_id:
          type: string
          format: uuid
        span_id:
          type: string
          description: External span identifier (used for parent-child relationships)
        parent_span_id:
          type: string
          description: External parent span identifier
        name:
          type: string
        kind:
          type: string
          enum: [LLM, TOOL, CHAIN, AGENT, CUSTOM]
        status:
          type: string
          enum: [SCHEDULED, STARTED, COMPLETED, FAILED]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        tokens_in:
          type: integer
        tokens_out:
          type: integer
        cost_usd:
          type: number
        latency_ms:
          type: integer
        error_message:
          type: string
        model:
          type: string
        provider:
          type: string
        input:
          description: Span input payload (any valid JSON)
        input_truncated:
          type: boolean
        input_original_size_bytes:
          type: integer
          format: int64
        input_truncation_reason:
          type: string
        output:
          description: Span output payload (any valid JSON)
        output_truncated:
          type: boolean
        output_original_size_bytes:
          type: integer
          format: int64
        output_truncation_reason:
          type: string
        metadata:
          type: object

    SpanList:
      type: object
      required: [spans]
      properties:
        spans:
          type: array
          items:
            $ref: '#/components/schemas/Span'

    Session:
      type: object
      required: [id, external_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        external_id:
          type: string
          description: Human-readable external session identifier used by SDKs
        name:
          type: string
        user_id:
          type: string
          description: User identifier for this session
        trace_count:
          type: integer
          description: Number of traces in this session
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    SessionList:
      type: object
      required: [sessions, total]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        total:
          type: integer

    SessionNarrativeResponse:
      type: object
      required: [summary, traces]
      properties:
        summary:
          $ref: '#/components/schemas/SessionNarrativeSummary'
        traces:
          type: array
          items:
            $ref: '#/components/schemas/SessionNarrativeTrace'

    SessionNarrativeSummary:
      type: object
      required:
        [
          total_trace_count,
          returned_trace_count,
          truncated,
          running_trace_count,
          completed_trace_count,
          failed_trace_count,
          total_cost_usd,
          total_tokens_in,
          total_tokens_out,
          started_at,
          last_activity_at,
          explicit_link_count,
          inferred_link_count,
          unlinked_trace_count,
        ]
      properties:
        total_trace_count:
          type: integer
        returned_trace_count:
          type: integer
        truncated:
          type: boolean
        running_trace_count:
          type: integer
          description: Count of traces whose raw status normalizes to RUNNING.
        completed_trace_count:
          type: integer
          description: Count of traces whose raw status normalizes to COMPLETED.
        failed_trace_count:
          type: integer
          description: Count of traces whose raw status normalizes to FAILED.
        total_cost_usd:
          type: number
        total_tokens_in:
          type: integer
          format: int64
        total_tokens_out:
          type: integer
          format: int64
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Earliest trace start time in the session, or null when the session has no traces.
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Approximate session-level last activity timestamp computed from trace-level timestamps only.
            Per-trace latest_activity_at is the authoritative activity timestamp.
        explicit_link_count:
          type: integer
          description: Explicit lineage count for the shown narrative only.
        inferred_link_count:
          type: integer
          description: Inferred lineage count for the shown narrative only.
        unlinked_trace_count:
          type: integer
          description: Unlinked trace count for the shown narrative only.

    SessionNarrativeTrace:
      type: object
      required:
        [
          id,
          trace_id,
          name,
          status,
          started_at,
          latest_activity_at,
          semantic_events,
          lineage,
        ]
      properties:
        id:
          type: string
          format: uuid
        trace_id:
          type: string
          description: External trace identifier for the narrative trace.
        name:
          type: string
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
        user_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64
        error_count:
          type: integer
        total_cost_usd:
          type: number
        total_tokens_in:
          type: integer
          format: int64
        total_tokens_out:
          type: integer
          format: int64
        latest_activity_at:
          type: string
          format: date-time
        semantic_events:
          type: array
          description: |
            Explicit decision, effect, and wait events for this trace. SessionNarrativeTrace.trace_id is the
            external trace identifier, while each nested semantic_events[].trace_id remains the internal trace UUID
            from TimelineEvent.
          items:
            $ref: '#/components/schemas/TimelineEvent'
        lineage:
          $ref: '#/components/schemas/SessionNarrativeLineage'

    SessionNarrativeLineage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [explicit, inferred, unlinked]
        parent_trace_id:
          type: string
          description: External parent trace identifier within the shown narrative when linked.
        trigger_span_id:
          type: string
          description: Optional external span identifier carried by explicit metadata lineage.
        link_kind:
          type: string
          description: Optional metadata-provided lineage classification string.

    IngestRequest:
      type: object
      required: [batch_key]
      properties:
        batch_key:
          type: string
          description: Unique identifier for idempotency. Same batch_key returns success without reprocessing.
        traces:
          type: array
          items:
            $ref: '#/components/schemas/IngestTraceInput'
        spans:
          type: array
          items:
            $ref: '#/components/schemas/IngestSpanInput'
        events:
          type: array
          items:
            $ref: '#/components/schemas/IngestEventInput'

    IngestTraceInput:
      type: object
      required: [trace_id]
      properties:
        trace_id:
          type: string
          description: External trace identifier
        session_id:
          type: string
          description: External session key. The server resolves/creates the internal session UUID from this value.
        name:
          type: string
        user_id:
          type: string
        tags:
          type: array
          items:
            type: string
        environment:
          type: string
        release:
          type: string
        metadata:
          type: object
        input:
          description: Trace input data (any JSON-serializable value)
        output:
          description: Trace output data (any JSON-serializable value)
        status:
          type: string
          enum: [running, completed, failed]
          default: running
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time

    IngestSpanInput:
      type: object
      required: [trace_id, span_id, name, start_time]
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        parent_span_id:
          type: string
          description: External parent span identifier
        name:
          type: string
        type:
          type: string
          enum: [default, llm, tool, agent, chain, retrieval, embedding, generation]
          default: default
        status:
          type: string
          enum: [running, completed, failed]
          default: running
        status_message:
          type: string
        level:
          type: string
          enum: [debug, default, warning, error]
          default: default
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        input:
          description: Span input data (any JSON-serializable value)
        output:
          description: Span output data (any JSON-serializable value)
        model:
          type: string
        provider:
          type: string
        prompt_tokens:
          type: integer
          format: int64
        completion_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
          deprecated: true
          description: Deprecated compatibility field. total_tokens-only payloads are rejected; provide prompt_tokens and/or completion_tokens for supported rollups.
        total_cost:
          type: number
          format: double
        metadata:
          type: object
        sequence:
          type: integer
          format: int32
        depth:
          type: integer
          format: int32

    IngestEventType:
      type: string
      enum: [log, error, exception, message, metric, custom, state_change, decision, effect, wait]

    IngestEventLevel:
      type: string
      enum: [debug, info, warning, error]

    IngestEventInput:
      type: object
      required: [trace_id, span_id]
      properties:
        trace_id:
          type: string
          description: External trace identifier
        span_id:
          type: string
          description: External span identifier
        event_type:
          allOf:
            - $ref: '#/components/schemas/IngestEventType'
          default: log
        level:
          allOf:
            - $ref: '#/components/schemas/IngestEventLevel'
          default: info
        event_ts:
          type: string
          format: date-time
        sequence:
          type: integer
          format: int32
        message:
          type: string
        payload:
          type: object
          description: >
            Free-form event payload. Semantic debugger conventions apply for some event types:
            `effect` may include reserved `effect_id`;
            `wait` may include reserved `wait_id`;
            `state_change` expects `key`, `old_value`, `new_value`, and optional `namespace`;
            `decision` expects `question`, `chosen`, and optional `alternatives` and `reasoning`.
        idempotency_key:
          type: string
          description: Optional key for event-level deduplication

    TimelineEventType:
      type: string
      enum:
        [
          log,
          error,
          exception,
          message,
          metric,
          custom,
          state_change,
          decision,
          effect,
          wait,
          span_started,
          span_completed,
          span_failed,
        ]

    TimelineEventSource:
      type: string
      enum: [explicit, synthetic]

    TimelineEventLevel:
      type: string
      enum: [debug, info, warning, error]

    TimelineEvent:
      type: object
      required: [id, trace_id, event_type, timestamp, source]
      properties:
        id:
          type: string
          description: Opaque event identifier. Explicit events use persisted UUIDs; synthetic events use deterministic span-based IDs.
        trace_id:
          type: string
          format: uuid
        span_id:
          type: string
          description: External span identifier for the related span
        span_name:
          type: string
        event_type:
          $ref: '#/components/schemas/TimelineEventType'
        timestamp:
          type: string
          format: date-time
        source:
          $ref: '#/components/schemas/TimelineEventSource'
        level:
          $ref: '#/components/schemas/TimelineEventLevel'
        sequence:
          type: integer
          format: int32
          description: Explicit-event ordering value used to preserve same-timestamp ingest order. Absent for synthetic events.
        message:
          type: string
        payload:
          type: object
          description: Event payload details for explicit events and helper metadata for synthetic events

    TimelineResponse:
      type: object
      required: [events, trace_status, has_more]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
        trace_status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
        has_more:
          type: boolean
        next_cursor:
          type: string
          description: Opaque cursor for the next page when `has_more` is true
        poll_cursor:
          type: string
          description: Opaque cursor representing the last event included in this response. Use for incremental polling even when `has_more` is false.

    IngestResponse:
      type: object
      required: [status, batch_key]
      properties:
        status:
          type: string
          enum: [ok, accepted, duplicate, failed]
          description: Processing status. "accepted" for async mode, "duplicate" indicates the batch was already processed.
        batch_key:
          type: string
        batch_id:
          type: string
          format: uuid
          description: |
            Stable batch identifier returned for sync responses, true-async acceptance,
            and duplicates. It may be omitted for the legacy Stage A fake-async path.
        trace_count:
          type: integer
