          format: uuid
        session_id:
          type: string
          format: uuid
        session_external_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
